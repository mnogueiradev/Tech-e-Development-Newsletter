<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNews - A sua newsletter diária</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.3);
            top: -100px;
            left: -100px;
        }

        .shape2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.2);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            /* Alterado de 100% para dar respiro nas laterais */
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            /* Permite quebrar linha se não couber */
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
            white-space: nowrap;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(59, 130, 246, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            height: 20px;
        }

        .success {
            color: #34d399;
        }

        .error {
            color: #f87171;
        }

        @media (max-width: 500px) {
            .container {
                padding: 2rem 1.5rem;
                width: 95%;
            }

            h1 {
                font-size: 1.8rem;
            }

            p {
                font-size: 0.95rem;
                margin-bottom: 1.5rem;
            }

            .features {
                gap: 0.5rem;
            }

            .badge {
                font-size: 0.75rem;
                padding: 0.3rem 0.6rem;
            }

            input,
            button {
                padding: 0.85rem 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="container">
        <!-- Ícone do banner como logo da página de cadastro -->
        <img src="/Banner.png" alt="Logo" class="logo"
            onerror="this.src='https://via.placeholder.com/80/3b82f6/ffffff?text=TN'">

        <h1>Global TechNews</h1>
        <p>Receba diariamente 9 notícias de tecnologia curadas diretamente no seu email. Fontes do Brasil, EUA e Rússia.
        </p>

        <form id="subscribeForm">
            <input type="email" id="email" placeholder="Seu melhor email..." required>
            <button type="submit">Inscrever-se gratuitamente</button>
        </form>
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const button = e.target.querySelector('button');
            const statusMessage = document.getElementById('statusMessage');

            // Pega o fuso horário dinâmico do navegador do usuário
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            button.innerText = 'Inscrevendo...';
            button.disabled = true;

            try {
                const response = await fetch('/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput.value, timezone: userTimezone })
                });

                const data = await response.json();

                if (response.ok) {
                    statusMessage.innerText = 'Inscrição realizada com sucesso! 🎉';
                    statusMessage.className = 'status success';
                    emailInput.value = '';
                } else {
                    statusMessage.innerText = data.error || 'Erro ao realizar inscrição.';
                    statusMessage.className = 'status error';
                }
            } catch (err) {
                statusMessage.innerText = 'Erro de conexão com o servidor.';
                statusMessage.className = 'status error';
            } finally {
                button.innerText = 'Inscrever-se gratuitamente';
                button.disabled = false;
            }
        });
    </script>
</body>

</html>
